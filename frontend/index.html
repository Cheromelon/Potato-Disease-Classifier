<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Disease Classifier</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Potato Disease Classifier</h1>

    <p class="subtitle">
        Upload a potato leaf image to detect the disease.
    </p>

    <input
        type="file"
        id="imageInput"
        accept="image/*"
    >

    <div class="preview">
        <img id="previewImage">
    </div>

    <button id="predictBtn">
        Predict
    </button>

    <p id="loading"></p>

    <div class="result">

        <h2 id="disease"></h2>

        <p id="confidence"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
